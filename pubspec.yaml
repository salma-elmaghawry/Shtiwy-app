name: shtiwy
description: "Shtiwy is your ultimate travel companion, offering personalized
  itineraries, real-time updates, and seamless booking for an unforgettable
  travel experience."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  auto_route: ^11.1.0
  auto_route_generator: ^10.5.0
  build_runner: ^2.15.0
  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  easy_localization: ^3.0.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.0
  flutter_dotenv: ^5.1.0
  flutter_screenutil: ^5.9.2
  flutter_svg: ^2.3.0
  get_it: ^9.2.1
  google_fonts: ^8.1.0
  lean_builder: ^0.1.10
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.11.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/translations/
    - .env

# Configuration for flutter_launcher_icons must live at top-level under `flutter_icons`.
# Also ensure the package is declared in dev_dependencies.
flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FFFFFF" # Optional: Background color for adaptive icons (Android)
  adaptive_icon_foreground: assets/images/logo.png # Optional: Foreground for adaptive icons (Android)
